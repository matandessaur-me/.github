<p align="center">
<svg viewBox="0 0 900 640" width="100%" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="rgba(93,112,246,0.05)" stroke-width="1"/>
    </pattern>

    <linearGradient id="topgrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5d70f6"/>
      <stop offset="100%" stop-color="#5d70f6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="640" fill="#0a0b10"/>
  <rect width="900" height="640" fill="url(#grid)"/>

  <!-- Top accent -->
  <rect y="0" width="620" height="2" fill="url(#topgrad)"/>

  <!-- Logo -->
  <text x="56" y="48"
    font-family="Arial, sans-serif"
    font-size="14" font-weight="800" letter-spacing="2.5">
    <tspan fill="#ffffff">MATAN</tspan><tspan fill="#5d70f6">.</tspan><tspan fill="#ffffff">DESSAUR</tspan>
  </text>

  <!-- Nav -->
  <text x="614" y="48" font-size="12" fill="#3e4265">WORK</text>
  <text x="672" y="48" font-size="12" fill="#3e4265">STACK</text>
  <text x="740" y="48" font-size="12" fill="#3e4265">OPEN SOURCE</text>

  <line x1="56" y1="64" x2="844" y2="64"
    stroke="rgba(93,112,246,0.13)" stroke-width="1"/>

  <!-- Eyebrow -->
  <text x="56" y="100" font-size="12" fill="#5d70f6">
    AI BUILDER • OPEN SOURCE
  </text>

  <!-- Headline -->
  <text x="52" y="188" font-size="82" font-weight="900" fill="#ffffff">BUILD.</text>
  <text x="52" y="276" font-size="82" font-weight="900" fill="#5d70f6">SHIP.</text>
  <text x="52" y="364" font-size="82" font-weight="900" fill="#ffffff">REPEAT.</text>

  <!-- Tagline -->
  <text x="56" y="400" font-size="14" fill="#55607a">
    I build and deploy AI-powered solutions
  </text>
  <text x="56" y="420" font-size="14" fill="#55607a">
    that turn problems into working systems.
  </text>

  <!-- CTA -->
  <rect x="56" y="442" width="170" height="42" rx="3" fill="#5d70f6"/>
  <text x="141" y="468" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">
    EXPLORE REPOS
  </text>

  <!-- Cards -->
  <rect x="610" y="106" width="240" height="84" rx="5"
    fill="rgba(255,255,255,0.03)" stroke="rgba(93,112,246,0.2)"/>
  <text x="630" y="140" font-size="11" fill="#5d70f6">ACTIVELY BUILDING</text>

  <rect x="610" y="202" width="240" height="96" rx="5"
    fill="rgba(255,255,255,0.03)" stroke="rgba(93,112,246,0.2)"/>
  <text x="630" y="264" font-size="26" fill="#5d70f6">AI</text>
  <text x="630" y="284" font-size="12" fill="#3e4265">
