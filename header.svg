<svg fill="none" viewBox="0 0 900 680" width="900" height="680" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @keyframes fadeUp  { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
        @keyframes slideIn { from { width:0; } to { width:56px; } }
        @keyframes pulse   { 0%,100% { opacity:1; } 50% { opacity:0.25; } }
        @keyframes flicker { 0%,91%,95%,100% { opacity:1; } 92%,94% { opacity:0.55; } }

        .root {
          width: 900px;
          height: 680px;
          background: #0a0b10;
          overflow: hidden;
          position: relative;
          font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        .grid {
          position: absolute; inset: 0;
          background-image:
            linear-gradient(rgba(93,112,246,.045) 1px, transparent 1px),
            linear-gradient(90deg, rgba(93,112,246,.045) 1px, transparent 1px);
          background-size: 50px 50px;
        }

        .glow {
          position: absolute;
          top: -100px; left: -80px;
          width: 560px; height: 560px;
          background: radial-gradient(circle, rgba(93,112,246,0.11) 0%, transparent 68%);
          pointer-events: none;
        }

        .topbar {
          position: absolute;
          top: 0; left: 0; right: 0; height: 2px;
          background: linear-gradient(90deg, #5d70f6 0%, rgba(93,112,246,0) 60%);
        }

        /* ── NAV ── */
        .nav {
          position: absolute;
          top: 34px; left: 56px; right: 56px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          opacity: 0;
          animation: fadeUp 0.4s ease 0.1s forwards;
        }
        .nav-logo {
          font-size: 16px;
          font-weight: 800;
          letter-spacing: 0.18em;
          text-transform: uppercase;
          color: #fff;
          white-space: nowrap;
        }
        .nav-logo span { color: #5d70f6; }
        .nav-links { display: flex; gap: 32px; }
        .nav-link {
          font-size: 14px;
          font-weight: 500;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          color: #454868;
          white-space: nowrap;
        }

        .nav-rule {
          position: absolute;
          top: 74px; left: 56px; right: 56px;
          height: 1px;
          background: rgba(93,112,246,0.14);
          opacity: 0;
          animation: fadeUp 0.4s ease 0.2s forwards;
        }

        /* ── HERO LEFT ── */
        .hero {
          position: absolute;
          top: 114px; left: 56px;
          width: 490px;
        }

        .eyebrow {
          font-size: 14px;
          font-weight: 500;
          letter-spacing: 0.26em;
          text-transform: uppercase;
          color: #5d70f6;
          opacity: 0;
          animation: fadeUp 0.5s ease 0.3s forwards;
          margin-bottom: 22px;
          display: flex;
          align-items: center;
          gap: 14px;
        }
        .eyebrow-line {
          display: inline-block;
          width: 0; height: 1px;
          background: #5d70f6;
          animation: slideIn 0.6s ease 0.7s forwards;
          flex-shrink: 0;
        }

        .h1 {
          font-size: 88px;
          font-weight: 900;
          line-height: 0.93;
          letter-spacing: -0.03em;
          color: #ffffff;
          opacity: 0;
          animation: fadeUp 0.55s ease 0.4s forwards, flicker 9s ease 4s infinite;
          margin-bottom: 32px;
        }
        .h1 .blue { color: #5d70f6; }

        .tagline {
          font-size: 16px;
          line-height: 1.7;
          color: #5e6480;
          letter-spacing: 0.01em;
          opacity: 0;
          animation: fadeUp 0.5s ease 0.65s forwards;
          margin-bottom: 44px;
        }

        .cta-row {
          display: flex;
          align-items: center;
          gap: 28px;
          opacity: 0;
          animation: fadeUp 0.5s ease 0.85s forwards;
        }
        .btn {
          font-size: 14px;
          font-weight: 700;
          letter-spacing: 0.14em;
          text-transform: uppercase;
          padding: 14px 28px;
          background: #5d70f6;
          color: #fff;
          border-radius: 3px;
          white-space: nowrap;
        }
        .btn-ghost {
          font-size: 14px;
          font-weight: 500;
          letter-spacing: 0.1em;
          text-transform: uppercase;
          color: #454868;
          border-bottom: 1px solid #2a2d45;
          padding-bottom: 2px;
          white-space: nowrap;
        }

        /* ── RIGHT PANEL ── */
        .panel {
          position: absolute;
          top: 114px; right: 56px;
          width: 270px;
          display: flex;
          flex-direction: column;
          gap: 16px;
        }

        .card {
          background: rgba(255,255,255,0.028);
          border: 1px solid rgba(93,112,246,0.16);
          border-radius: 6px;
          padding: 22px 24px;
          opacity: 0;
        }
        .card:nth-child(1) { animation: fadeUp 0.5s ease 0.55s forwards; }
        .card:nth-child(2) { animation: fadeUp 0.5s ease 0.7s forwards; }
        .card:nth-child(3) { animation: fadeUp 0.5s ease 0.85s forwards; }

        .card-label {
          font-size: 14px;
          font-weight: 600;
          letter-spacing: 0.22em;
          text-transform: uppercase;
          color: #383d5e;
          margin-bottom: 12px;
        }

        .pill {
          display: inline-flex;
          align-items: center;
          gap: 8px;
          background: rgba(93,112,246,0.1);
          border: 1px solid rgba(93,112,246,0.28);
          border-radius: 100px;
          padding: 9px 18px;
          font-size: 14px;
          font-weight: 600;
          letter-spacing: 0.12em;
          text-transform: uppercase;
          color: #5d70f6;
          white-space: nowrap;
        }
        .pulsedot {
          width: 7px; height: 7px;
          border-radius: 50%;
          background: #5d70f6;
          flex-shrink: 0;
          animation: pulse 1.8s ease infinite;
        }

        .card-val {
          font-size: 34px;
          font-weight: 900;
          color: #5d70f6;
          letter-spacing: -0.02em;
          line-height: 1;
          margin-bottom: 8px;
        }
        .card-sub {
          font-size: 15px;
          color: #454868;
          letter-spacing: 0.04em;
        }
        .card-val-lg {
          font-size: 22px;
          font-weight: 800;
          color: #fff;
          letter-spacing: -0.01em;
          line-height: 1.1;
          margin-bottom: 8px;
        }

        /* ── BOTTOM BAR ── */
        .bottombar {
          position: absolute;
          bottom: 34px; left: 56px; right: 56px;
          border-top: 1px solid rgba(93,112,246,0.1);
          padding-top: 20px;
          display: flex;
          justify-content: space-between;
          align-items: center;
          opacity: 0;
          animation: fadeUp 0.4s ease 1.05s forwards;
        }
        .bottom-left { display: flex; gap: 30px; align-items: center; }
        .bitem {
          font-size: 14px;
          font-weight: 500;
          letter-spacing: 0.12em;
          text-transform: uppercase;
          color: #2a2e48;
          white-space: nowrap;
        }
        .bitem.active { color: #5d70f6; }
        .bottom-right {
          font-size: 14px;
          font-weight: 400;
          letter-spacing: 0.1em;
          color: #2a2e48;
          white-space: nowrap;
        }
      </style>

      <div class="root">
        <div class="grid"></div>
        <div class="glow"></div>
        <div class="topbar"></div>

        <div class="nav">
          <div class="nav-logo">MATAN<span>.</span>DESSAUR</div>
          <div class="nav-links">
            <div class="nav-link">Work</div>
            <div class="nav-link">Stack</div>
            <div class="nav-link">Open Source</div>
          </div>
        </div>
        <div class="nav-rule"></div>

        <div class="hero">
          <div class="eyebrow">
            <span class="eyebrow-line"></span>
            AI Builder &#x2022; Open Source
          </div>
          <div class="h1">
            BUILD.<br/>
            <span class="blue">SHIP.</span><br/>
            REPEAT.
          </div>
          <div class="tagline">
            I build and deploy AI-powered solutions<br/>
            that turn problems into working systems.
          </div>
          <div class="cta-row">
            <div class="btn">Explore Repos</div>
            <div class="btn-ghost">matandessaur.me &#x2197;</div>
          </div>
        </div>

        <div class="panel">
          <div class="card">
            <div class="card-label">Status</div>
            <div class="pill">
              <div class="pulsedot"></div>
              Actively Building
            </div>
          </div>
          <div class="card">
            <div class="card-label">Focus</div>
            <div class="card-val">AI</div>
            <div class="card-sub">Agents &middot; Pipelines &middot; Tools</div>
          </div>
          <div class="card">
            <div class="card-label">License</div>
            <div class="card-val-lg">Open Source</div>
            <div class="card-sub">Fork it. Build on it.</div>
          </div>
        </div>

        <div class="bottombar">
          <div class="bottom-left">
            <div class="bitem active">&#x25CF; Open Source</div>
            <div class="bitem">Self-hostable</div>
            <div class="bitem">Production-ready</div>
          </div>
          <div class="bottom-right">&#169; Matan Dessaur</div>
        </div>
      </div>

    </div>
  </foreignObject>
</svg>
