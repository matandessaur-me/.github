  </text>

  <rect x="610" y="310" width="240" height="96" rx="5"
    fill="rgba(255,255,255,0.03)" stroke="rgba(93,112,246,0.2)"/>
  <text x="630" y="370" font-size="18" fill="#ffffff">Open Source</text>

  <!-- Footer -->
  <line x1="56" y1="594" x2="844" y2="594"
    stroke="rgba(93,112,246,0.1)"/>

  <text x="56" y="621" font-size="12" fill="#5d70f6">OPEN SOURCE</text>
  <text x="200" y="621" font-size="12" fill="#252840">SELF-HOSTABLE</text>
  <text x="350" y="621" font-size="12" fill="#252840">PRODUCTION-READY</text>

