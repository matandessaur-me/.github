<svg fill="none" viewBox="0 0 900 380" width="900" height="380" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @keyframes fadeUp {
          from { opacity: 0; transform: translateY(20px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes slideIn {
          from { width: 0; }
          to   { width: 100%; }
        }
        @keyframes pulse {
          0%, 100% { opacity: 1; }
          50%       { opacity: 0.4; }
        }
        @keyframes scanline {
          0%   { transform: translateY(-100%); }
          100% { transform: translateY(400px); }
        }
        @keyframes blink {
          0%, 100% { opacity: 1; }
          50%       { opacity: 0; }
        }
        @keyframes revealLeft {
          from { opacity: 0; transform: translateX(-12px); }
          to   { opacity: 1; transform: translateX(0); }
        }

        .wrap {
          width: 900px;
          height: 380px;
          background: #07080f;
          font-family: 'Courier New', Courier, monospace;
          overflow: hidden;
          position: relative;
          display: flex;
          flex-direction: column;
          justify-content: center;
          padding: 0 64px;
        }

        /* Subtle grid lines */
        .grid {
          position: absolute;
          inset: 0;
          background-image:
            linear-gradient(rgba(93,112,246,0.04) 1px, transparent 1px),
            linear-gradient(90deg, rgba(93,112,246,0.04) 1px, transparent 1px);
          background-size: 40px 40px;
        }

        /* Left accent bar */
        .accent-bar {
          position: absolute;
          left: 0;
          top: 0;
          bottom: 0;
          width: 4px;
          background: #5d70f6;
          animation: fadeUp 0.4s ease forwards;
        }

        /* Scanline effect */
        .scanline {
          position: absolute;
          left: 0; right: 0;
          height: 2px;
          background: linear-gradient(90deg, transparent, rgba(93,112,246,0.15), transparent);
          animation: scanline 6s linear infinite;
          pointer-events: none;
        }

        /* Top label */
        .label {
          font-size: 10px;
          letter-spacing: 0.35em;
          text-transform: uppercase;
          color: #5d70f6;
          opacity: 0;
          animation: revealLeft 0.5s ease 0.2s forwards;
          margin-bottom: 20px;
        }

        /* Main headline */
        .headline {
          font-family: 'Arial Narrow', Arial, sans-serif;
          font-size: 68px;
          font-weight: 900;
          line-height: 1;
          letter-spacing: -0.02em;
          color: #ffffff;
          opacity: 0;
          animation: fadeUp 0.6s ease 0.4s forwards;
          margin-bottom: 6px;
        }
        .headline .accent { color: #5d70f6; }

        /* Underline rule */
        .rule {
          height: 2px;
          background: #5d70f6;
          width: 0;
          animation: slideIn 0.7s cubic-bezier(0.4,0,0.2,1) 0.9s forwards;
          margin-bottom: 20px;
        }

        /* Sub copy */
        .sub {
          font-size: 13px;
          letter-spacing: 0.08em;
          color: #8892b0;
          opacity: 0;
          animation: fadeUp 0.6s ease 1.1s forwards;
          max-width: 540px;
          line-height: 1.7;
        }

        /* Bottom row */
        .bottom-row {
          position: absolute;
          bottom: 28px;
          left: 64px;
          right: 64px;
          display: flex;
          align-items: center;
          justify-content: space-between;
          opacity: 0;
          animation: fadeUp 0.5s ease 1.4s forwards;
        }
        .bottom-left {
          font-size: 9px;
          letter-spacing: 0.3em;
          text-transform: uppercase;
          color: #3a4060;
        }
        .status {
          display: flex;
          align-items: center;
          gap: 6px;
          font-size: 9px;
          letter-spacing: 0.2em;
          text-transform: uppercase;
          color: #3a4060;
        }
        .dot {
          width: 6px;
          height: 6px;
          border-radius: 50%;
          background: #5d70f6;
          animation: pulse 2s ease infinite;
        }

        /* Corner mark */
        .corner {
          position: absolute;
          top: 24px;
          right: 64px;
          font-size: 9px;
          letter-spacing: 0.25em;
          color: #2a2d45;
          opacity: 0;
          animation: fadeUp 0.4s ease 0.3s forwards;
        }
      </style>

      <div class="wrap">
        <div class="grid"></div>
        <div class="scanline"></div>
        <div class="accent-bar"></div>
        <div class="corner">MATANDESSAUR.ME — AI ORG</div>

        <div class="label">Open Source · AI Tools · Production Ready</div>

        <div class="headline">
          PROBLEMS IN.<br/>
          <span class="accent">SYSTEMS</span> OUT.
        </div>

        <div class="rule"></div>

        <div class="sub">
          Building and deploying AI-powered solutions that work.<br/>
          Everything here is open source — fork it, extend it, ship it.
        </div>

        <div class="bottom-row">
          <div class="bottom-left">Matan Dessaur — AI Builder</div>
          <div class="status">
            <div class="dot"></div>
            Actively building
          </div>
        </div>
      </div>

    </div>
  </foreignObject>
</svg>
